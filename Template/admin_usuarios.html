<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <title>Admin - Gerenciar Usuários</title>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="/" class="logo"><img src="/Imagens/logo.png" alt="Logo"></a>
            <ul class="nav-links">
                <li><a href="/catalogo">Loja</a></li>
                <li><a href="/logout">Sair</a></li>
            </ul>
        </nav>
    </header>

    <div class="admin-container">
        <h2>Painel de Controle de Usuários</h2>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Tipo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for user in usuarios %}
                <tr>
                    <td>{{ user.id_usuario }}</td>
                    <td>{{ user.nome }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.tipo }}</td>
                    <td>
                        <button class="btn-edit" onclick="abrirModal('{{ user.id_usuario|safe }}', '{{ user.nome|safe }}', '{{ user.email|safe }}')">Editar</button>
                        
                        <form action="/admin/usuarios/deletar/{{ user.id_usuario }}" method="POST" style="display:inline;" onsubmit="return confirm('Excluir usuário?')">
                            <button type="submit" class="btn-del">Excluir</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div id="modalEditar">
        <div class="login-caixa modal-content">
            <h2 style="color:#d4af37">Editar Cadastro</h2>
            <form action="/admin/usuarios/editar" method="post">
                <input type="hidden" name="id_usuario" id="edit_id">
                
                <h4 style="text-align: left; color: white;">Nome:</h4>
                <input type="text" name="nome" id="edit_nome" oninput="MascaraNome(this)" required>
                
                <h4 style="text-align: left; color: white;">E-mail:</h4>
                <input type="email" name="email" id="edit_email" oninput="mascaraEmail(this)" required>
                
                <button type="submit">Salvar Alterações</button>
                <button type="button" onclick="fecharModal()" style="background:#444; color: white; margin-top:10px;">Cancelar</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', path='/script.js') }}"></script>
    <script>
        function abrirModal(id, nome, email) {
            document.getElementById('edit_id').value = id;
            document.getElementById('edit_nome').value = nome;
            document.getElementById('edit_email').value = email;
            document.getElementById('modalEditar').style.display = 'block';
        }
        function fecharModal() { 
            document.getElementById('modalEditar').style.display = 'none'; 
        }
    </script>
</body>
</html>
