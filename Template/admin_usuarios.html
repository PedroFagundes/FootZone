<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <title>Admin - Gerenciar Usuários</title>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="/Imagens/logo.png" alt="Logo">
            </div>
            <ul class="nav-links">
                <li><a href="/catalogoAdmin">Loja</a></li>
                <li><a href="/logout">Sair</a></li>
            </ul>
        </nav>
    </header>

    <div class="admin-container">
        <h2>Painel de Controle de Usuários</h2>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Tipo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for user in usuarios %}
                <tr>
                    <td>{{ user.id_usuario }}</td>
                    <td>{{ user.nome }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.tipo }}</td>
                    <td>
                        <button class="btn-edit" 
                                type="button"
                                data-id="{{ user.id_usuario }}"
                                data-nome="{{ user.nome }}"
                                data-email="{{ user.email }}"
                                data-cpf="{{ user.cpf if user.cpf else '' }}"
                                data-telefone="{{ user.telefone if user.telefone else '' }}"
                                onclick="prepararModal(this)">
                            Editar
                        </button>
                        
                        <form action="/admin/usuarios/deletar/{{ user.id_usuario }}" method="POST" style="display:inline;" onsubmit="return confirm('Excluir usuário?')">
                            <button type="submit" class="btn-del">Excluir</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div id="modalEditar" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center;">
        <div class="login-caixa modal-content" style="width: 420px; padding: 25px; background: #111; border-radius: 10px;">
            <h2 style="color:#d4af37; margin-bottom: 15px;">Editar Cadastro</h2>
            <form action="/admin/usuarios/editar" method="post">
                <input type="hidden" name="id_usuario" id="edit_id">
                
                <h4 style="text-align: left; color: white; margin-top: 10px;">Nome:</h4>
                <input type="text" name="nome" id="edit_nome" oninput="MascaraNome(this)" required>
                
                <h4 style="text-align: left; color: white; margin-top: 10px;">E-mail:</h4>
                <input type="email" name="email" id="edit_email" oninput="this.value = this.value.toLowerCase()" required>
                
                <h4 style="text-align: left; color: white; margin-top: 10px;">Telefone de Contato:</h4>
                <input type="text" name="telefone" id="edit_telefone" oninput="mascaraTelefone(this)" placeholder="(00) 00000-0000" required>

                <h4 style="text-align: left; color: white; margin-top: 10px;">CPF:</h4>
                <input type="text" name="cpf" id="edit_cpf" oninput="mascaraCPF(this)" placeholder="000.000.000-00" required>
                
                <button type="submit" style="margin-top: 20px;">Salvar Alterações</button>
                <button type="button" onclick="fecharModal()" style="background:#444; color: white; margin-top:10px;">Cancelar</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', path='/script.js') }}"></script>
    <script>
        function prepararModal(botao) {
            document.getElementById('edit_id').value = botao.getAttribute('data-id');
            document.getElementById('edit_nome').value = botao.getAttribute('data-nome');
            
            // Garante que o e-mail carregue em minúsculo por segurança
            document.getElementById('edit_email').value = botao.getAttribute('data-email').toLowerCase();
            
            const campoTelefone = document.getElementById('edit_telefone');
            campoTelefone.value = botao.getAttribute('data-telefone');
            if (typeof mascaraTelefone === "function") mascaraTelefone(campoTelefone);

            const campoCPF = document.getElementById('edit_cpf');
            campoCPF.value = botao.getAttribute('data-cpf');
            if (typeof mascaraCPF === "function") mascaraCPF(campoCPF);
            
            document.getElementById('modalEditar').style.display = 'flex';
        }

        function fecharModal() { 
            document.getElementById('modalEditar').style.display = 'none'; 
        }
    </script>
</body>
</html>
