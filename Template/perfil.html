<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    
    <title>Editar Perfil</title>

    <style>
        .admin-container {
            /* Alterado de 100px para 40px para subir a tabela na tela */
            margin: 40px auto; 
            max-width: 700px;
            padding: 30px;
            background: #111;
            border-radius: 10px;
            color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .admin-container h2 {
            color: #d4af37;
            margin-bottom: 25px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 12px;
        }

        label {
            color: #d4af37;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #222;
            color: white;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #d4af37;
        }

        /* Estilo para campos que não podem ser editados (CPF) */
        input[readonly] {
            background: #1a1a1a;
            color: #888;
            border-color: #222;
            cursor: not-allowed;
        }

        .botoes {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-edit {
            background: #d4af37;
            color: black;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-edit:hover {
            background: #c49b2d;
        }

        .btn-del {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-del:hover {
            background: #e04343;
        }
    </style>
</head>

<body>

    <header>
        <nav class="navbar">
            <a href="/" class="logo">
                <img src="/Imagens/logo.png" alt="Logo">
            </a>

            <ul class="nav-links">
                <li><a href="/catalogo">Loja</a></li>
                <li><a href="/logout">Sair</a></li>
            </ul>
        </nav>
    </header>

    <div class="admin-container">

        <h2>Editar Perfil</h2>

        <form action="/perfil/editar" method="post">

            <table>

                <tr>
                    <td>
                        <label for="nome">Nome</label>
                    </td>
                    <td>
                        <input 
                            type="text" 
                            id="nome" 
                            name="nome" 
                            value="{{ dados_usuario.nome }}" 
                            required
                        >
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="email">E-mail</label>
                    </td>
                    <td>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            value="{{ dados_usuario.email }}" 
                            required
                        >
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="cpf">CPF</label>
                    </td>
                    <td>
                        <!-- CPF enviado como readonly por segurança -->
                        <input 
                            type="text" 
                            id="cpf" 
                            name="cpf" 
                            value="{{ dados_usuario.cpf[0:3] }}.{{ dados_usuario.cpf[3:6] }}.{{ dados_usuario.cpf[6:9] }}-{{ dados_usuario.cpf[9:12] }}"
                            readonly
                        >
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="telefone">Telefone</label>
                    </td>
                    <td>
                        <input 
                            type="text" 
                            id="telefone" 
                            name="telefone" 
                            value="{{ dados_usuario.telefone }}" 
                        >
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="senha">Nova Senha</label>
                    </td>
                    <td>
                        <input 
                            type="password" 
                            id="senha" 
                            name="senha" 
                            placeholder="Digite sua senha atual ou uma nova"
                            required
                        >
                    </td>
                </tr>

            </table>

            <div class="botoes">
                <button type="submit" class="btn-edit">
                    Salvar Alterações
                </button>

                <button 
                    type="button" 
                    class="btn-del"
                    onclick="window.location.href='/catalogo'"
                >
                    Cancelar
                </button>
            </div>

        </form>

    </div>

</body>
</html>
