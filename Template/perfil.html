<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <title>Editar Perfil - FootZone</title>
</head>

<body>

<header>
    <nav class="navbar">
        <a href="/" class="logo">
            <img src="/Imagens/logo.png" alt="Logo">
        </a>

        <ul class="nav-links">
            <li><a href="/catalogo">Loja</a></li>
            <li>
                <a href="/perfil" style="display: inline-flex; align-items: center; gap: 8px;">
                    {% if dados_usuario.avatar_b64 %}
                        <img src="data:image/jpeg;base64,{{ dados_usuario.avatar_b64 }}" alt="Perfil" style="width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 1px solid #d4af37;">
                    {% else %}
                        <img src="/Imagens/default_avatar.png" alt="Perfil" style="width: 30px; height: 30px; border-radius: 50%; object-fit: cover;">
                    {% endif %}
                    
                    {{ usuario.split(' ')[0] }}
                </a>
            </li>
            <li><a href="/logout">Sair</a></li>
        </ul>
    </nav>
</header>

    <div class="admin-container">

        <h2>Editar Perfil</h2>

        <form action="/perfil/editar" method="post" enctype="multipart/form-data">

<div class="avatar-wrapper">
    {% if dados_usuario.avatar_b64 %}
        <img src="data:image/jpeg;base64,{{ dados_usuario.avatar_b64 }}" alt="Avatar" id="avatar-pic">
    {% else %}
        <img src="/Imagens/default_avatar.png" alt="Avatar" id="avatar-pic">
    {% endif %}
    
    <input type="file" id="avatar" name="avatar" accept="image/*" class="avatar-file-input">
    
    <label for="avatar" class="avatar-label-btn">
        Selecionar Avatar
    </label>
</div>

            <table>

                <tr>
                    <td>
                        <label for="nome">Nome</label>
                    </td>
                    <td>
                        <span class="obrigatorio"></span>
                        
                        <input type="text" id="nome" name="nome" oninput="MascaraNome(this)" required value="{{ dados_usuario.nome }}" >
                        <span id="erro-nome" class="erro"></span>
                        
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="email">E-mail</label>
                    </td>
                    <td>
                       
                       <span class="obrigatorio"> </span>
                    </label>
                    <input type="email" name="email" id="email" oninput="mascaraEmail(this)" required value="{{ dados_usuario.email }}">
                    <span id="erro-email" class="erro"></span>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="cpf">CPF</label>
                    </td>
                    <td>
                        <input 
                            type="text" 
                            id="cpf" 
                            name="cpf" 
                            value="{{ dados_usuario.cpf[0:3] }}.{{ dados_usuario.cpf[3:6] }}.{{ dados_usuario.cpf[6:9] }}-{{ dados_usuario.cpf[9:12] }}" 
                            readonly
                        >
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="telefone">Telefone</label>
                    </td>
                    <td>
                        
                        <span class="obrigatorio"></span>
                    </label>
                    <input type="text" name="telefone" id="telefone" oninput="mascaraTelefone(this)"  required value="{{ dados_usuario.telefone}}">
                    <span id="erro-telefone" class="erro"></span>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="senha">Nova Senha</label>
                    </td>
                    <td>

                    
                     <span class="obrigatorio"></span>
                       </label >
                <div class="campo-senha">
                    <input type="password" name="senha" id="senha" oninput="senhaForte(this)" required
                    placeholder="Digite a sua senha atual ou uma nova senha">
                    <span class="toggle-senha" onclick="toggleSenha()" id="btnSenha">
           
                        <!-- Ícone de alternar visibilidade da senha -->
                        <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#d4af37">
                            <path d="M480.2-192q-148.2 0-264.7-80.5T48-480q51-127 167.3-207.5Q331.6-768 479.8-768t264.7 80.5Q861-607 912-480q-51 127-167.3 207.5Q628.4-192 480.2-192ZM181-130q-43.04-27.14-77.02-61.07T48-267l64-34q17 32 47 61t65 51l-43 59Zm299-134q115.38 0 209.69-58T833-480q-49-100-143.31-158T480-696q-115.38 0-209.69 58T127-480q49 100 143.31 158T480-264ZM246-96l43-61q35.07 13.71 74.03 22.86Q402-125 444-122.3V-50q-56-4-105.5-16T246-96Zm234-216q70 0 119-49t49-119q0-70-49-119t-119-49q-70 0-119 49t-49 119q0 70 49 119t119 49Zm0-72q-40 0-68-28t-28-68q0-40 28-68t68-28q40 0 68 28t28 68q0 40-28 68t-68 28Zm36 334v-72q42-2 80.97-11.14Q635.93-142.29 671-156l43 60q-44 19-93 30.5T516-50Zm263-80-43-59q38-24 66.5-52t45.5-60l64 34q-22 42-55.98 75.93Q822.04-157.14 779-130ZM480-480Z"/>
                        </svg>
                    </span>
                </div>
                <span id="erro-senha" class="erro"></span>
                    </td>
                </tr>

            </table>

            <div class="botoes">
                <button type="submit" class="btn-edit">
                    Salvar Alterações
                </button>

                <button 
                    type="button" 
                    class="btn-del"
                    onclick="window.location.href='/catalogo'"
                >
                    Cancelar
                </button>
            </div>

        </form>

    </div>
    <script src="{{ url_for('static', path='/script.js') }}"></script>
</body>
</html>
