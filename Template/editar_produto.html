<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', path='/admin_forms.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    
    <title>FootZone - Editar Produto</title>

</head>

<body>

<header>
    <nav class="navbar">
        <a href="/" class="logo">
            <img src="/Imagens/logo.png" alt="Logo">
        </a>

        <ul class="nav-links">
            <li><a href="/catalogo">Loja</a></li>
            <li>
                <a href="/empresa/painel" style="display: inline-flex; align-items: center; gap: 8px;">
                    {{ usuario }}
                </a>
            </li>
            <li><a href="/logout">Sair</a></li>
        </ul>
    </nav>
</header>

    <div class="admin-container">

        <h2>Editar Produto</h2>

        <form action="/empresa/produtos/editar/{{ produto.id_produto }}" method="post" enctype="multipart/form-data">

            <div class="avatar-wrapper">
                {% if produto.avatar_b64 %}
                    <img src="data:image/jpeg;base64,{{ produto.avatar_b64 }}" alt="Produto" id="avatar-pic">
                {% else %}
                    <img src="https://via.placeholder.com/200" alt="Sem foto" id="avatar-pic">
                {% endif %}
                
                <input type="file" id="imagem_arquivo" name="imagem_arquivo" accept="image/*" class="avatar-file-input">
                
                <label for="imagem_arquivo" class="avatar-label-btn">
                    Alterar Foto do Produto
                </label>
            </div>

            <table>
                <tr>
                    <td>
                        <label for="nome">Nome</label>
                    </td>
                    <td>
                        <input type="text" id="nome" name="nome" value="{{ produto.nome }}" required>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="marca">Marca</label>
                    </td>
                    <td>
                        <input type="text" id="marca" name="marca" value="{{ produto.marca }}" required>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="categoria">Categoria</label>
                    </td>
                    <td>
                        <input type="text" id="categoria" name="categoria" value="{{ produto.categoria }}" required>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="tamanho">Tamanho</label>
                    </td>
                    <td>
                        <input type="text" id="tamanho" name="tamanho" value="{{ produto.tamanho }}" required>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="preco">Preço (R$)</label>
                    </td>
                    <td>
                        <input type="number" step="0.01" id="preco" name="preco" value="{{ produto.preco }}" required>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="descricao">Descrição</label>
                    </td>
                    <td>
                        <input type="text" id="descricao" name="descricao" value="{{ produto.descricao if produto.descricao else '' }}">
                    </td>
                </tr>
            </table>

            <div class="botoes">
                <button type="submit" class="btn-edit">
                    Salvar Alterações
                </button>

                <button 
                    type="button" 
                    class="btn-del"
                    onclick="window.location.href='/empresa/painel'"
                >
                    Cancelar
                </button>
            </div>

        </form>

    </div>
    <script src="{{ url_for('static', path='/script.js') }}"></script>
</body>
</html>
