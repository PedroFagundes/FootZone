<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <title>FootZone - Editar Produto</title>
</head>
<body class="login-body-page" style="height: auto !important; min-height: 100vh !important; display: flex !important; align-items: center !important; justify-content: center !important; padding: 40px 0 !important; overflow-y: auto !important;">
    <div class="background"></div>
    
    <div class="login-caixa" style="width: 450px; padding: 30px; margin: 0 auto;">
        <div class="campos">
            <a href="/empresa/painel" class="campoAtivo">Voltar ao Painel</a>
        </div>

        <h2>Editar Produto</h2>

        <form action="/empresa/produtos/editar/{{ produto.id_produto }}" method="post" enctype="multipart/form-data">
            
            <h4>Nome do Produto:</h4>
            <input type="text" name="nome" value="{{ produto.nome }}" required>

            <h4>Marca:</h4>
            <input type="text" name="marca" value="{{ produto.marca }}" required>

            <h4>Categoria:</h4>
            <input type="text" name="categoria" value="{{ produto.categoria }}" required>

            <h4>Tamanho:</h4>
            <input type="text" name="tamanho" value="{{ produto.tamanho }}" required>

            <h4>Preço (R$):</h4>
            <input type="number" step="0.01" name="preco" value="{{ produto.preco }}" required>

            <h4>Descrição do Produto:</h4>
            <input type="text" name="descricao" value="{{ produto.descricao if produto.descricao else '' }}">

            <h4>Imagem do Produto:</h4>
            {% if produto.avatar_b64 %}
                <div style="text-align: center; margin-bottom: 10px;">
                    <img src="data:image/jpeg;base64,{{ produto.avatar_b64 }}" style="width: 100px; height: 100px; object-fit: cover; border-radius: 8px; border: 1px solid #d4af37;">
                    <p style="color: #aaa; font-size: 12px; margin: 5px 0 0 0;">Imagem atual</p>
                </div>
            {% endif %}
            <input type="file" name="imagem_arquivo" accept="image/*" style="padding: 8px;">
            <p style="color: #888; font-size: 11px; margin-top: -5px; padding-left: 8px;">Deixe em branco para manter a imagem atual.</p>

            <button type="submit" style="margin-top: 15px;">Salvar Alterações</button>
        </form>
    </div>

    <script src="{{ url_for('static', path='/script.js') }}"></script>
</body>
</html>
